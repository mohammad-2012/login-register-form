<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Validation Form | Modern UI</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div class="form-container">
        <h2 class="form-title">Sign In</h2>

        <form action="#" class="form login-form active">
          <div class="input-box">
            <input
              type="email"
              name="email"
              class="form-input"
              id="login-email-input"
              autocomplete="off"
              placeholder="Your Email Address..."
            />
            <span class="alert-text" id="login-email-alert"></span>
          </div>

          <div class="input-box">
            <div class="password-box-inner">
              <input
                type="password"
                name="password"
                class="form-input password-input"
                id="login-password-input"
                placeholder="Password"
              />
              <span class="eye-btn">
                <i class="fa-solid fa-eye"></i>
              </span>
            </div>
            <span class="alert-text" id="login-password-alert"></span>
          </div>

          <div class="ends-item">
            <button type="submit" class="form-btn">Login</button>
            <a href="#" class="forgot-pass-text">Forgot your password?</a>
            <div class="navigate-link-wrapper">
              Not Registered?
              <a href="#" class="navigate-link" data-link="register">Signup</a>
            </div>
          </div>
        </form>

        <form action="#" class="form register-form">
          <div class="input-box">
            <input
              type="email"
              name="email"
              autocomplete="off"
              class="form-input"
              id="register-email-input"
              placeholder="Email Address"
            />
            <span class="alert-text" id="register-email-alert"></span>
          </div>

          <div class="input-box">
            <div class="password-box-inner">
              <input
                type="password"
                name="password"
                class="form-input password-input"
                id="register-password-input"
                placeholder="Password"
              />
              <span class="eye-btn">
                <i class="fa-solid fa-eye"></i>
              </span>
            </div>
            <span class="alert-text" id="register-password-alert"></span>
          </div>

          <div class="input-box">
            <div class="password-box-inner">
              <input
                type="password"
                name="password"
                class="form-input password-input"
                id="register-confirm-password-input"
                placeholder="Confirm Password"
              />
              <span class="eye-btn">
                <i class="fa-solid fa-eye"></i>
              </span>
            </div>
            <span
              class="alert-text"
              id="register-confirm-password-alert"
            ></span>
          </div>

          <div class="ends-item">
            <button type="submit" class="form-btn">Sign Up</button>
            <div class="navigate-link-wrapper">
              Have An Account?
              <a href="#" class="navigate-link" data-link="login">Login</a>
            </div>
          </div>
        </form>
      </div>

      <div class="panel-wrapper">
        <div class="follow-our-icons">
          <a href="#" class="follow-icon" data-hover-text="Telegram">
            <i class="fa-brands fa-telegram"></i>
          </a>
          <a href="#" class="follow-icon" data-hover-text="Instagram">
            <i class="fa-brands fa-instagram"></i>
          </a>
          <a href="#" class="follow-icon" data-hover-text="YouTube">
            <i class="fa-brands fa-youtube"></i>
          </a>
          <a href="#" class="follow-icon" data-hover-text="GitHub">
            <i class="fa-brands fa-github"></i>
          </a>
        </div>

        <h2 class="panel-title">Hello World!</h2>
        <p class="panel-text">Sign Up now and enjoy our site</p>
        <div class="btn-container">
          <button class="panel-btn login-btn active" role="button">
            SIGN IN
          </button>
          <button class="panel-btn register-btn" role="button">SIGN UP</button>
        </div>
      </div>
    </div>

    <script src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </body>
</html>
